<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Soul — Deb Wong</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Caption:wght@400;700&display=swap" rel="stylesheet">

  <style>
    @font-face {
      font-family: 'TieLan';
      src: url('fonts/★铁兰体.ttf') format('truetype');
    }
    @font-face {
      font-family: 'DreamHan';
      src: url('fonts/DreamHanSansCN-W3.ttf') format('truetype');
    }

    body {
      background-color:#f7fdf4;
      font-family: 'PT Sans Caption', sans-serif;
      overflow-x: hidden;
    }
    .mix-multiply { mix-blend-mode: multiply; }
    
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-grow { 
      opacity: 0;
      animation: fadeInUp 1s cubic-bezier(0.22, 1, 0.36, 1) forwards; 
    }

    @keyframes lineGrow {
      from { width: 0; }
      to { width: 100%; }
    }
    .animate-line {
      animation: lineGrow 2s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      animation-delay: 0.5s;
    }

    .glow-dot-leaf {
      box-shadow: 0 0 8px rgba(139, 213, 128, 0.4);
    }

    /* ── Language toggle ── */
    .lang-toggle {
      position: fixed;
      top: 60px;
      right: 5%;
      z-index: 50;
      display: flex;
      border: 1px solid #ccc;
      border-radius: 20px;
      overflow: hidden;
      opacity: 0;
      animation: fadeInUp 1s ease forwards 0.5s;
    }
    .lang-toggle button {
      background: none;
      border: none;
      padding: 5px 16px;
      font-size: 12px;
      font-family: 'PT Sans Caption', sans-serif;
      color: #888;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }
    .lang-toggle button.active {
      background: #7a9e7e;
      color: #fff;
    }
    .lang-toggle button:hover:not(.active) {
      background: #f0f0f0;
    }

    /* ── Chinese font overrides ── */
    .zh-body {
      font-family: 'DreamHan', sans-serif;
      font-size: 13px;
      line-height: 1.9;
    }
    .zh-title-font {
      font-family: 'TieLan', serif;
    }

    /* hide/show helpers */
    .lang-en { display: block; }
    .lang-zh { display: none; }
    .lang-en-inline { display: inline; }
    .lang-zh-inline { display: none; }

    /* Pattern Grid */
    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
      max-width: 900px;
      margin: 0 auto;
    }

    .pattern-item {
      aspect-ratio: 1;
      border-radius: 12px;
      overflow: hidden;
      background: white;
      transition: all 0.3s cubic-bezier(0.22, 1, 0.36, 1);
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      cursor: pointer;
      position: relative;
    }

    .pattern-item:hover {
      transform: translateY(-8px);
      box-shadow: 0 12px 24px rgba(0,0,0,0.12);
    }

    .pattern-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 摄影图片的悬停效果 */
    .pattern-item.photo-item {
      position: relative;
    }

    .pattern-item.photo-item::after {
      content: '👁️ View';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 14px;
      font-weight: bold;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .pattern-item.photo-item:hover::after {
      opacity: 1;
    }

    /* Modal */
    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .modal.active {
      display: flex;
      opacity: 1;
    }

    .modal-content {
      background: white;
      border-radius: 20px;
      max-width: 90%;
      max-height: 90%;
      overflow: auto;
      position: relative;
      animation: fadeInUp 0.3s cubic-bezier(0.22, 1, 0.36, 1);
    }

    /* 印花正方形显示 */
    .modal-content.pattern-modal {
      width: 500px;
      height: 500px;
      max-width: 90%;
      aspect-ratio: 1;
    }

    .modal img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
    }

/* 摄影保持原尺寸 */
.modal-content.photo-modal {
  width: 500px;
  height: 500px;
  max-width: 90%;
  aspect-ratio: auto;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: transparent;  ← 改成透明背景
  border-radius: 0;         ← 去掉圆角
  box-shadow: none;         ← 去掉阴影
}

.modal-content.photo-modal img {
  object-fit: contain;
  max-width: 100%;
  max-height: 100%;
}

    .modal-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: white;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 24px;
      color: #666;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: #f0f0f0;
      color: #000;
    }
  </style>
</head>

  <!-- ══════════════════════════════════
       SCRIPTS
  ══════════════════════════════════ -->
<script>
  function setLang(lang) {
    const btnEn = document.getElementById('btn-en');
    const btnZh = document.getElementById('btn-zh');
    document.querySelectorAll('.lang-en').forEach(el => el.style.display = lang === 'en' ? 'block' : 'none');
    document.querySelectorAll('.lang-zh').forEach(el => el.style.display = lang === 'zh' ? 'block' : 'none');
    document.querySelectorAll('.lang-en-inline').forEach(el => el.style.display = lang === 'en' ? 'inline' : 'none');
    document.querySelectorAll('.lang-zh-inline').forEach(el => el.style.display = lang === 'zh' ? 'inline' : 'none');
    
    if (lang === 'zh') {
      btnEn.classList.remove('active');
      btnZh.classList.add('active');
    } else {
      btnZh.classList.remove('active');
      btnEn.classList.add('active');
    }
  }

  function openModal(itemId) {
    const modal = document.getElementById('modal');
    const modalImage = document.getElementById('modal-image');
    const modalContent = document.querySelector('.modal-content');
    
    // 判断是否是摄影（photo开头）还是印花（pattern开头）
    if (itemId.startsWith('photo')) {
      modalContent.classList.remove('pattern-modal');
      modalContent.classList.add('photo-modal');
      modalImage.src = `images/${itemId}.png`;
    } else {
      modalContent.classList.remove('photo-modal');
      modalContent.classList.add('pattern-modal');
      modalImage.src = `images/${itemId}.webp`;
    }
    
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    const modal = document.getElementById('modal');
    modal.classList.remove('active');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeModal();
  });
</script>
