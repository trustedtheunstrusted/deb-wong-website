

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Deb Wong</title>
    <style>

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background-color: #fafaf7;
        font-family: sans-serif;
        background-color:#f7fdf4; 
      }

      .hero {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }

      /* 淡入动画 */
      @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      /* 花花循环动画 */
      @keyframes flowerLoop {
        0%   { opacity: 0.3; }
        50%  { opacity: 1; }
        100% { opacity: 0.3; }
      }

      /* 背景藤蔓 — 第一个出现 */
      .bg {
        position: absolute;
        width: 110%;
        height: 100%;
        object-fit: cover;
        top: 0;
        left: -5%;
        z-index: 1;
        mix-blend-mode: multiply;
        opacity: 0;
        animation: fadeIn 0.5s ease forwards;
        animation-delay: 0s;
      }

      /* 粉色小花 — 淡入后开始循环 */
      .flowers-pink {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        top: 0;
        left: 0;
        z-index: 2;
        opacity: 0;
        animation: fadeIn  0.5s ease forwards 3s, flowerLoop 12s ease-in-out 8s infinite;
      }

      /* 紫色小花 — 淡入后开始循环，跟粉花错开 */
      .flowers-purple {
        position: absolute;
        width: 100%;
        height: 100%;
        object-fit: cover;
        top: 0;
        left: 0;
        z-index: 3;
        opacity: 0;
        animation: fadeIn 1s ease forwards 4s, flowerLoop 14s ease-in-out 10s infinite;
      }

      /* 名字 — 第四个出现 */
      .name {
        position: absolute;
        width: 400px;
        top: 42%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: 10;
        mix-blend-mode: multiply;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 1s;
      }

      /* 导航区域 — 最后出现 */
      .nav {
        position: absolute;
        bottom: 40px;
        width: 100%;
        display: flex;
        justify-content: space-between;
        padding: 0 40px;
        z-index: 20;
        box-sizing: border-box;
        opacity: 0;
        animation: fadeIn 1s ease forwards;
        animation-delay: 5s;
      }

      .nav a img {
        height: 70px;
        cursor: pointer;
        transition: opacity 0.3s;
        mix-blend-mode: multiply;
      }

      .nav a img:hover {
        opacity: 0.5;
      }

    </style>
  </head>
  <body>

    <section class="hero">
      <img class="bg" src="images/bg.png" alt="background" />
      <img class="flowers-pink" src="images/flowers-pink.png" alt="pink flowers" />
      <img class="flowers-purple" src="images/flowers-purple.png" alt="purple flowers" />
      <img class="name" src="images/name.png" alt="Deb Wong" />

      <nav class="nav">
        <a href="about.html"><img src="images/nav-about.png" alt="About me" /></a>
        <a href="project.html"><img src="images/nav-projects.png" alt="My projects" /></a>
        <a href="work.html"><img src="images/nav-work.png" alt="Work with me" /></a>
      </nav>
    </section>
    
  </body>
</html>
